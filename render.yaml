services:
  # Backend Service
  - type: web
    name: rescuebite-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDirectory: server
    envVarGroups:
      - name: rescuebite-env
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # Frontend Static Site
  - type: static
    name: rescuebite-frontend
    rootDirectory: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        value: https://smart-food-redistribution-system.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
